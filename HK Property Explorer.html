        .filter-group label { font-size: 0.7rem; font-weight: 600; color: #2c5a4a; }

        .footer-note { position: absolute; bottom: 10px; right: 12px; background: rgba(0,0,0,0.6); color: white; padding: 3px 10px; border-radius: 20px; font-size: 11px; z-index: 1000; pointer-events: none; }

    <div class="filter-group">

    </div>
    <div class="filter-group">

        <input type="number" id="maxArea" placeholder="Max" step="10" style="margin-top: 4px;">
    </div>
    <div class="filter-group">
        <label><i class="fas fa-building"></i> Building Age (years)</label>
        <input type="number" id="minAge" placeholder="Min" step="1">
        <input type="number" id="maxAge" placeholder="Max" step="1" style="margin-top: 4px;">
    </div>
    <div class="action-group">

        <button id="resetFilterBtn" class="btn btn-reset"><i class="fas fa-undo-alt"></i> Reset</button>
        <div id="resultStats" class="stats"><i class="fas fa-home"></i> <span id="propertyCount">0</span> properties</div>
    </div>
</div>

    let markerCluster = L.markerClusterGroup();
    let currentMarkers = [];

    function buildPopup(p) {
    const priceHKD = (p.price * 10000).toLocaleString();
    return `<div class="property-popup" style="min-width:200px">
                <strong>${p.name}</strong><br>
                <i class="fas fa-map-pin"></i> ${p.address}<br>
                <i class="fas fa-dollar-sign"></i> ${priceHKD} HKD<br>
                <i class="fas fa-vector-square"></i> ${p.area ? p.area + ' sq.ft' : 'N/A'}<br>
                <i class="fas fa-calendar-alt"></i> Age: ${p.age} years
            </div>`;
    }

    function filterProperties() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
        const minPrice = parseFloat(document.getElementById('minPrice').value);
        const maxPrice = parseFloat(document.getElementById('maxPrice').value);
        const minArea = parseFloat(document.getElementById('minArea').value);
        const maxArea = parseFloat(document.getElementById('maxArea').value);
        const minAge = parseFloat(document.getElementById('minAge').value);
        const maxAge = parseFloat(document.getElementById('maxAge').value);

        return allProperties.filter(p => {
            // search
            if (searchTerm && !(p.name.toLowerCase().includes(searchTerm) || p.address.toLowerCase().includes(searchTerm))) return false;
            // price
            if (!isNaN(minPrice) && p.price < minPrice) return false;
            if (!isNaN(maxPrice) && p.price > maxPrice) return false;
            // area (ignore if null)
            if (p.area !== null && p.area !== undefined) {
                if (!isNaN(minArea) && p.area < minArea) return false;
                if (!isNaN(maxArea) && p.area > maxArea) return false;
            } else if ((!isNaN(minArea) || !isNaN(maxArea))) {
                // if area is missing but filter is active, exclude (optional)
                return false;
            }
            // age
            if (!isNaN(minAge) && p.age < minAge) return false;
            if (!isNaN(maxAge) && p.age > maxAge) return false;
            return true;
        });
    }

    function updateMap() {
        const filtered = filterProperties();
        document.getElementById('propertyCount').innerText = filtered.length;
        
        // Clear existing clusters
        markerCluster.clearLayers();
        filtered.forEach(prop => {
            if (prop.lat && prop.lng) {
                const marker = L.marker([prop.lat, prop.lng]);
                marker.bindPopup(buildPopup(prop));
                markerCluster.addLayer(marker);
            }
        });
        map.addLayer(markerCluster);
        
        // If only one result, zoom a bit closer
        if (filtered.length === 1 && filtered[0].lat) {
            map.setView([filtered[0].lat, filtered[0].lng], 16);
        } else if (filtered.length > 0) {
            // optional: fit bounds? skip to keep user view
        }
    }

    // Event listeners
    document.getElementById('applyFilterBtn').addEventListener('click', updateMap);
    document.getElementById('resetFilterBtn').addEventListener('click', () => {
        document.getElementById('searchInput').value = '';
        document.getElementById('minPrice').value = '';
        document.getElementById('maxPrice').value = '';
        document.getElementById('minArea').value = '';
        document.getElementById('maxArea').value = '';
        document.getElementById('minAge').value = '';
        document.getElementById('maxAge').value = '';
        updateMap();
    });
    
    // Initial load
    updateMap();
